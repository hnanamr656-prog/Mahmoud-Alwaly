<style>

/* ===== Background Animation ===== */
body{
  margin:0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(-45deg,#000,#0a0a0a,#001a1a,#000);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== Card ===== */
.app{
  width:370px;
  padding:30px 18px;
  border-radius:30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,204,0.15);
}

/* ===== Profile Glow ===== */
.profile{
  position:relative;
  width:150px;
  height:150px;
  margin:auto;
}

.profile::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  background:conic-gradient(#00ffcc,#0066ff,#00ffcc);
  animation:spin 3s linear infinite;
  filter:blur(10px);
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

.profile img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  position:relative;
  border:3px solid #000;
}

/* ===== Name ===== */
.name{
  color:#fff;
  font-size:22px;
  margin:15px 0;
  letter-spacing:1px;
}

/* ===== Icons ===== */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

.icons a{
  width:45px;
  height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  background:#111;
  color:#fff;
  text-decoration:none;
  transition:.3s;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn .6s forwards;
}

.icons a:nth-child(1){animation-delay:.2s;}
.icons a:nth-child(2){animation-delay:.4s;}
.icons a:nth-child(3){animation-delay:.6s;}
.icons a:nth-child(4){animation-delay:.8s;}
.icons a:nth-child(5){animation-delay:1s;}

.icons a:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.1);
}

/* ===== Links ===== */
.link{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:#fff;
  text-decoration:none;
  transition:.3s;

  opacity:0;
  transform:translateY(20px);
  animation:fadeIn .6s forwards;
}

.link:nth-of-type(1){animation-delay:1.2s;}
.link:nth-of-type(2){animation-delay:1.4s;}
.link:nth-of-type(3){animation-delay:1.6s;}
.link:nth-of-type(4){animation-delay:1.8s;}
.link:nth-of-type(5){animation-delay:2s;}

.link:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.03);
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== Footer ===== */
.footer{
  color:#888;
  font-size:11px;
  margin-top:20px;
}
</style>
