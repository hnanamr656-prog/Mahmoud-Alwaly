<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* ===== App ===== */
.app{
  width:360px;
  background:#000;
  border-radius:30px;
  padding:30px 18px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
}

/* ===== Profile ===== */
.profile{
  position:relative;
  width:150px;
  height:150px;
  margin:0 auto;
}

.profile::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  background:linear-gradient(45deg,#00ffcc,#0066ff,#00ffcc);
  animation:rotate 3s linear infinite;
  filter:blur(10px);
  z-index:0;
}

.profile img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  position:relative;
  z-index:1;
  border:3px solid #000;
}

@keyframes rotate{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* ===== Name ===== */
.name{
  color:#fff;
  font-size:22px;
  margin:15px 0;
}

/* ===== Small Icons ===== */
.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

.icons a{
  width:45px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#111;
  color:#fff;
  font-size:18px;
  text-decoration:none;
  transition:.3s;
}

.icons a:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.1);
}

/* ===== Big Links ===== */
.link{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
  font-size:14px;
}

.link:hover{
  background:#00ffcc;
  color:#000;
  transform:scale(1.03);
}

/* Footer */
.footer{
  color:#666;
  font-size:11px;
  margin-top:20px;
}
</style>
